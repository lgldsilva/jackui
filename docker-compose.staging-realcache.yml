# STAGING "real cache" — variant that mounts prod's REAL PIECE CACHE, to test
# playback against ALREADY-DOWNLOADED files (the empty cache-staging masked
# everything: probe 502, EVENT mode, backstop misfire).
#
# PREREQUISITE: prod `jackui` MUST be STOPPED (the cache's bolt DB takes an
# exclusive flock — two anacrolix in the same dir collide). Sequence:
#   docker --context homeserver compose -p jackui stop            # stop prod
#   docker --context homeserver compose -p jackui-staging -f docker-compose.staging-realcache.yml up -d
#   ... test at http://192.168.86.24:8990 ...
#   docker --context homeserver compose -p jackui-staging -f docker-compose.staging-realcache.yml down
#   docker --context homeserver compose -p jackui ... up -d       # restore prod
#
# Safety: state DBs live in config-staging (a snapshot) → prod DBs UNTOUCHED.
# MAX_GB=60 (> prod's 50) → staging's LRU does NOT evict prod pieces.
services:
  jackui-staging:
    image: jackui:staging-nvidia
    container_name: jackui-staging
    restart: "no"
    user: "1000:1000"
    stop_grace_period: 30s
    runtime: nvidia
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          memory: 256m
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu", "video", "compute", "utility"]
    healthcheck:
      disable: true
    ports:
      - "0.0.0.0:${STAGING_PORT:-8990}:8989"
      - "51470:51469/tcp"
      - "51470:51469/udp"
    volumes:
      # Estado ISOLADO (snapshot dos favoritos/biblioteca/art) — protege a prod
      - /Files/AppData/Config/jackui-staging/config.yaml:/app/config.yaml
      - /Files/AppData/Config/jackui-staging:/data
      # ⚠️ PROD's *REAL* PIECE CACHE (already-downloaded files) — prod must be stopped!
      - /mnt/lvm1-storage/jacktrack/cache:/data/streams
      # Library/mounts shared with prod (read-only here — staging doesn't promote)
      - /mnt/lvm1-storage:/mnt/storage:ro
      - /mnt/rclone/gdrive/pessoal/media:/mnt/gdrive/media:ro
      - /mnt/rclone/gdrive/pessoal/sensitive:/mnt/gdrive/sensitive:ro
    environment:
      - JACKETT_URL=${JACKETT_URL:-http://jackett:9117}
      - JACKETT_API_KEY=${JACKETT_API_KEY}
      - JACKUI_PORT=8989
      - JACKUI_DB_PATH=/data/jackui.db
      - JACKUI_STREAM_DIR=/data/streams
      - JACKUI_STATE_DIR=/data
      # > prod's 50 → the LRU won't evict prod pieces during the test
      - JACKUI_STREAM_MAX_GB=${JACKUI_STREAM_MAX_GB:-60}
      - JACKUI_DOWNLOAD_DIR=/data/downloads
      - JACKUI_SHARED_DIR=/data/shared
      - JACKUI_EXTERNAL_MOUNTS=GDrive Media:/mnt/gdrive/media
      - JACKUI_AUTH_ENABLED=${JACKUI_AUTH_ENABLED:-1}
      - JACKUI_ADMIN_USERNAME=${JACKUI_ADMIN_USERNAME:-admin}
      - JACKUI_ADMIN_PASSWORD=${JACKUI_ADMIN_PASSWORD}
      - JACKUI_JWT_SECRET=${JACKUI_JWT_SECRET}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - OMDB_API_KEY=${OMDB_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - JACKUI_BASE_URL=http://${STAGING_HOST_IP:-192.168.86.24}:${STAGING_PORT:-8990}
    networks:
      - vpn-gateway_vpn-net

networks:
  vpn-gateway_vpn-net:
    external: true
