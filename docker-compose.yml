services:
  jackui:
    image: jackui:${JACKUI_TAG:-latest}
    container_name: jackui
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    # Graceful shutdown: 30s for the app to handle SIGTERM, stop the HTTP server and
    # run the defers (anacrolix.Client.Close commits the piece state to the bolt DB;
    # without this, a restart made anacrolix re-download already-written pieces).
    stop_grace_period: 30s
    # Resource caps — 4-core/15G host shared with Jackett/Ollama/Jellyfin/*arr.
    # Transcode is GPU (NVENC), so CPU/RAM stay modest; a runaway can't starve
    # the host. deploy.resources (not legacy mem_limit) so it merges cleanly with
    # the nvidia overlay's deploy.resources.reservations.devices.
    # Override via JACKUI_CPU_LIMIT / JACKUI_MEM_LIMIT.
    deploy:
      resources:
        limits:
          cpus: "${JACKUI_CPU_LIMIT:-2.0}"
          memory: ${JACKUI_MEM_LIMIT:-2g}
        reservations:
          memory: 256m
    healthcheck:
      disable: true
    ports:
      - "127.0.0.1:8989:8989"
      - "51469:51469/tcp"   # BitTorrent peer port (TCP)
      - "51469:51469/udp"   # BitTorrent peer port (UDP / DHT)
    volumes:
      # Host paths come from .env (gitignored) so the public repo carries no
      # machine-specific layout — harmless local defaults (./data/*) are used
      # when a var is unset. Keeping config and the piece cache on separate
      # volumes avoids I/O contention (e.g. with Jackett/Ollama).
      - ${JACKUI_CONFIG_DIR:-./data/config}/config.yaml:/app/config.yaml
      - ${JACKUI_CONFIG_DIR:-./data/config}:/data
      # Large streaming piece cache (sequential writes, LRU-managed).
      - ${JACKUI_CACHE_DIR:-./data/cache}:/data/streams
      # Shared media library — same source/dest volume enables instant "promote"
      # (avoids EXDEV/slow cross-device copies). Surfaced on the "Local" page.
      - ${JACKUI_STORAGE_DIR:-./data/storage}:/mnt/storage
      # Optional extra mounts (e.g. rclone/NFS). Leave the *_MOUNT vars unset in
      # .env to fall back to harmless local dirs; set them to your real paths.
      #
      # rslave (mount propagation): when the host's rclone/FUSE mount is torn
      # down and re-created (rclone restart, vfs cache reset, a mover script),
      # a default (rprivate) bind keeps pointing at the now-dead mount inode —
      # every ReadDir then fails with "transport endpoint is not connected" and
      # the Local page 500s until the container is restarted. As a slave, the
      # bind tracks the host's remounts automatically, so no restart is needed.
      # Requires the host mount to be shared (systemd makes / rshared by default,
      # which the rclone mounts inherit — verify with `findmnt -no PROPAGATION`).
      - ${JACKUI_MEDIA_MOUNT:-./data/media}:/mnt/gdrive/media:rw,rslave
      - ${JACKUI_SENSITIVE_MOUNT:-./data/sensitive}:/mnt/gdrive/sensitive:rw,rslave
      # NOTE: a "sensitive" mount also needs config.yaml to set allowed_users:
      #   external:
      #     mounts:
      #       - name: "Sensitive"
      #         path: /mnt/gdrive/sensitive
      #         allowed_users: ["admin"]
    environment:
      - JACKETT_URL=${JACKETT_URL:-http://jackett:9117}
      - JACKETT_API_KEY=${JACKETT_API_KEY}
      - JACKUI_PORT=8989
      - JACKUI_DB_PATH=/data/jackui.db
      - JACKUI_STREAM_DIR=/data/streams
      # State DBs (favorites, library, downloads, tmdb-cache, etc.) live on the
      # Portainer SSD instead of the LVM piece cache — eases I/O contention with
      # Jackett/Ollama. The piece cache (DataDir) stays on the LVM.
      - JACKUI_STATE_DIR=/data
      - JACKUI_STREAM_MAX_GB=${JACKUI_STREAM_MAX_GB:-50}
      # Fuso do processo. O scheduler de banda (bandwidth_schedules) compara as
      # janelas HH:MM com a hora LOCAL do container — sem TZ ele roda em UTC e
      # uma janela "23:00-06:00" pensada em Brasília vale 3h adiantada. tzdata
      # já está na imagem.
      - TZ=${TZ:-America/Sao_Paulo}
      # Logs estruturados: "json" ou texto (padrão).
      - JACKUI_LOG_FORMAT=${JACKUI_LOG_FORMAT:-}
      # Token estático pro scraper do Prometheus quando JACKUI_AUTH_ENABLED=1
      # (JWTs expiram; scrape configs não fazem refresh). Vazio = só admin JWT.
      - JACKUI_METRICS_TOKEN=${JACKUI_METRICS_TOKEN:-}
      - JACKUI_DOWNLOAD_DIR=/mnt/storage/jacktrack/download
      # Destination of the "Promote" button — moves a file from the app's private
      # area to the shared library visible to all media apps.
      - JACKUI_SHARED_DIR=/mnt/storage/Downloads
      # Browsable mounts on the "Local" page (Name:/container/path,...).
      # "Downloads" = shared (everyone sees it); "Meus downloads" = app's own area.
      # The ":usersubpath" suffix isolates per user (mount/{username}/...): each one
      # only sees/writes their own subfolder. Without the suffix, the directory is
      # SHARED across all regular users (uploads/deletes visible to everyone).
      # "Meus downloads" uses :usersubpath → loose files at the root are migrated
      # on boot into the owner's subfolder (via the downloads DB; no owner → admin).
      - JACKUI_EXTERNAL_MOUNTS=Downloads:/mnt/storage/Downloads,Meus downloads:/mnt/storage/jacktrack/download:usersubpath,GDrive Media:/mnt/gdrive/media
      - JACKUI_AUTH_ENABLED=${JACKUI_AUTH_ENABLED:-1}
      - JACKUI_ADMIN_USERNAME=${JACKUI_ADMIN_USERNAME:-admin}
      - JACKUI_ADMIN_PASSWORD=${JACKUI_ADMIN_PASSWORD}
      - JACKUI_JWT_SECRET=${JACKUI_JWT_SECRET}
      # Optional TMDB enrichment — posters + overview in result cards.
      # Get a free key at https://www.themoviedb.org/settings/api
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      # Optional OMDb key for the REAL IMDb rating on cards (falls back to the
      # TMDB vote when unset). Free key: https://www.omdbapi.com/apikey.aspx
      - OMDB_API_KEY=${OMDB_API_KEY:-}
      # Optional ntfy.sh push for the Watchlist worker.
      # Pick any unique topic, then subscribe on the ntfy app: ntfy.sh/<your-topic>
      - JACKUI_NTFY_TOPIC=${JACKUI_NTFY_TOPIC:-}
      - JACKUI_NTFY_URL=${JACKUI_NTFY_URL:-https://ntfy.sh}
      # Optional AI title-identification chain (improves TMDB matching). Values
      # live in the LOCAL .env (gitignored); leave blank to disable. Lights up
      # automatically when at least one key/base-url is present.
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      # SMTP for password reset / e-mail confirmation / invites (values in the local
      # .env, gitignored). Empty = those flows become admin-copyable links.
      - JACKUI_SMTP_HOST=${JACKUI_SMTP_HOST:-}
      - JACKUI_SMTP_PORT=${JACKUI_SMTP_PORT:-}
      - JACKUI_SMTP_USER=${JACKUI_SMTP_USER:-}
      - JACKUI_SMTP_PASS=${JACKUI_SMTP_PASS:-}
      - JACKUI_SMTP_FROM=${JACKUI_SMTP_FROM:-}
      - JACKUI_BASE_URL=${JACKUI_BASE_URL:-https://jackui.example.com}
    networks:
      - vpn-gateway_vpn-net
      - npm-network

networks:
  vpn-gateway_vpn-net:
    external: true
  npm-network:
    external: true
    name: nginx-proxy-manager-sqllite-goaccess_default
