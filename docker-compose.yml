services:
  jackui:
    image: jackui:${JACKUI_TAG:-latest}
    container_name: jackui
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    # Graceful shutdown: 30s pra o app processar SIGTERM, parar o HTTP server e
    # rodar os defers (anacrolix.Client.Close commita o estado de pieces no
    # bolt DB; sem isso, restart fazia anacrolix re-baixar pieces já gravados).
    stop_grace_period: 30s
    # Resource caps — 4-core/15G host shared with Jackett/Ollama/Jellyfin/*arr.
    # Transcode is GPU (NVENC), so CPU/RAM stay modest; a runaway can't starve
    # the host. Override via JACKUI_CPU_LIMIT / JACKUI_MEM_LIMIT.
    mem_limit: ${JACKUI_MEM_LIMIT:-2g}
    mem_reservation: 256m
    cpus: ${JACKUI_CPU_LIMIT:-2.0}
    healthcheck:
      disable: true
    ports:
      - "127.0.0.1:8989:8989"
      - "51469:51469/tcp"   # BitTorrent peer port (TCP)
      - "51469:51469/udp"   # BitTorrent peer port (UDP / DHT)
    volumes:
      # App config + all SQLite DBs in Portainer's standard AppData location.
      # Separated from the LVM streaming cache to avoid I/O contention with
      # Jackett/Ollama (which also live on the LVM volume).
      - /portainer/Files/AppData/Config/jackui/config.yaml:/app/config.yaml
      - /portainer/Files/AppData/Config/jackui:/data
      # Large streaming piece cache stays on the LVM (sequential writes, LRU-managed).
      - /mnt/lvm1-storage/jacktrack/cache:/data/streams
      # Browsable/playable libraries (read-only) — surfaced on the "Local" page
      # via JACKUI_EXTERNAL_MOUNTS below.
      # Mount unificado do storage compartilhado para permitir promoção instantânea
      # (mesmo volume de origem/destino evita EXDEV/cópia lenta na movimentação).
      - /mnt/lvm1-storage:/mnt/storage
      # Google Drive mounts (rclone FUSE) — RAW para mídia, CRYPT para dados sensíveis.
      # RW para permitir promover (upload) downloads concluídos direto pro GDrive.
      - /mnt/rclone/gdrive/pessoal/media:/mnt/gdrive/media:rw
      - /mnt/rclone/gdrive/pessoal/sensitive:/mnt/gdrive/sensitive:rw
      # NOTE: The sensitive (crypt) mount also needs config.yaml to set
      # allowed_users. Add to /portainer/.../jackui/config.yaml:
      #   external:
      #     mounts:
      #       - name: "GDrive Sensitivo"
      #         path: /mnt/gdrive/sensitive
      #         allowed_users: ["admin"]
    environment:
      - JACKETT_URL=${JACKETT_URL:-http://jackett:9117}
      - JACKETT_API_KEY=${JACKETT_API_KEY}
      - JACKUI_PORT=8989
      - JACKUI_DB_PATH=/data/jackui.db
      - JACKUI_STREAM_DIR=/data/streams
      # State DBs (favorites, library, downloads, tmdb-cache, etc.) live on the
      # Portainer SSD instead of the LVM piece cache — alivia contenção de I/O
      # com Jackett/Ollama. Cache de pieces (DataDir) fica no LVM.
      - JACKUI_STATE_DIR=/data
      - JACKUI_STREAM_MAX_GB=${JACKUI_STREAM_MAX_GB:-50}
      - JACKUI_DOWNLOAD_DIR=/mnt/storage/jacktrack/download
      # Destino do botão "Promover" — move arquivo da área privada do app
      # pra biblioteca compartilhada visível a todos os apps de mídia.
      - JACKUI_SHARED_DIR=/mnt/storage/Downloads
      # Browsable mounts on the "Local" page (Name:/container/path,...).
      # "Downloads" = shared (todos veem); "Meus downloads" = app's own area.
      - JACKUI_EXTERNAL_MOUNTS=Downloads:/mnt/storage/Downloads,Meus downloads:/mnt/storage/jacktrack/download,GDrive Media:/mnt/gdrive/media
      - JACKUI_AUTH_ENABLED=${JACKUI_AUTH_ENABLED:-1}
      - JACKUI_ADMIN_USERNAME=${JACKUI_ADMIN_USERNAME:-admin}
      - JACKUI_ADMIN_PASSWORD=${JACKUI_ADMIN_PASSWORD}
      - JACKUI_JWT_SECRET=${JACKUI_JWT_SECRET}
      # Optional TMDB enrichment — posters + overview in result cards.
      # Get a free key at https://www.themoviedb.org/settings/api
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      # Optional OMDb key for the REAL IMDb rating on cards (falls back to the
      # TMDB vote when unset). Free key: https://www.omdbapi.com/apikey.aspx
      - OMDB_API_KEY=${OMDB_API_KEY:-}
      # Optional ntfy.sh push for the Watchlist worker.
      # Pick any unique topic, then subscribe on the ntfy app: ntfy.sh/<your-topic>
      - JACKUI_NTFY_TOPIC=${JACKUI_NTFY_TOPIC:-}
      - JACKUI_NTFY_URL=${JACKUI_NTFY_URL:-https://ntfy.sh}
      # Optional AI title-identification chain (improves TMDB matching). Values
      # live in the LOCAL .env (gitignored); leave blank to disable. Lights up
      # automatically when at least one key/base-url is present.
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      # SMTP p/ reset de senha / confirmação de e-mail / convites (valores no .env
      # local, gitignored). Vazio = fluxos viram links copiáveis pelo admin.
      - JACKUI_SMTP_HOST=${JACKUI_SMTP_HOST:-}
      - JACKUI_SMTP_PORT=${JACKUI_SMTP_PORT:-}
      - JACKUI_SMTP_USER=${JACKUI_SMTP_USER:-}
      - JACKUI_SMTP_PASS=${JACKUI_SMTP_PASS:-}
      - JACKUI_SMTP_FROM=${JACKUI_SMTP_FROM:-}
      - JACKUI_BASE_URL=${JACKUI_BASE_URL:-https://jackui.raspberrypi.lan}
    networks:
      - vpn-gateway_vpn-net
      - npm-network

networks:
  vpn-gateway_vpn-net:
    external: true
  npm-network:
    external: true
    name: nginx-proxy-manager-sqllite-goaccess_default
