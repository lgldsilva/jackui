# CI — gates de Pull Request (backend + frontend + auto-approve). Migração Jenkins → Gitea Actions.
#
# SÓ roda em `pull_request`: os gates pertencem ao PR. O deploy (e os gates no contexto
# da main) são do release.yml, que RE-roda backend/frontend no push da main — o Sonar
# Community só analisa push e o job `sonar` consome o coverage.out gerado no mesmo run.
# Manter `push: [main]` aqui duplicava backend+frontend a cada merge (o release já os roda).
name: CI
on:
  pull_request:

jobs:
  backend:
    runs-on: [self-hosted, arm64]
    # Postgres de teste como service container (substitui o sidecar jackui-ci-pg do Jenkins).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jackui
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: jackui
          PGPORT: 5433
        # Health-check pra o runner só liberar os steps quando o PG aceitar
        # conexões (o act_runner nem sempre espera; o step "aguardar Postgres"
        # abaixo é o reforço definitivo contra "connection refused").
        options: >-
          --health-cmd "pg_isready -U jackui -p 5433"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      JACKUI_TEST_DATABASE_URL: postgres://jackui:ci@127.0.0.1:5433/jackui?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum
      - name: ffmpeg (testes de transcode/streamer)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: gofmt (falha se houver arquivo fora do padrão)
        run: 'test -z "$(gofmt -l .)" || { echo "gofmt:"; gofmt -l .; exit 1; }'
      - name: go vet
        run: go vet ./internal/...
      - name: aguardar Postgres aceitar conexões
        run: |
          for i in $(seq 1 30); do
            (exec 3<>/dev/tcp/127.0.0.1/5433) 2>/dev/null && { exec 3>&-; echo "postgres pronto"; break; }
            echo "aguardando postgres ($i/30)…"; sleep 2
          done
      - name: go test + cobertura
        run: go test -coverprofile=coverage.out ./internal/...
      - name: Publica coverage.out (para o job do Sonar p/ main em release.yml)
        uses: actions/upload-artifact@v3
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        with:
          name: go-coverage
          path: coverage.out

  frontend:
    runs-on: [self-hosted, arm64]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint      # ESLint: sonarjs/cognitive-complexity 15 (espelha S3776)
      - run: npm test          # vitest run
      - run: npm run build

  approve:
    needs: [backend, frontend]
    runs-on: [self-hosted, arm64]
    # Executa a aprovação se os testes passarem e for de fato um PR
    if: github.event_name == 'pull_request'
    steps:
      - name: Auto-approve PR via bot
        env:
          BOTK: ${{ secrets.REGISTRY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -n "$BOTK" ] && [ -n "$PR_NUMBER" ]; then
            echo "Aprovando PR #$PR_NUMBER via bot..."
            curl -sf -X POST -H "Authorization: token $BOTK" -H 'Content-Type: application/json' \
              "${{ github.api_url }}/repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
              -d '{"event":"APPROVED","body":"Gates do CI verdes (backend test + frontend build) — aprovado automaticamente pelo ci-bot no Gitea Actions."}' || echo "Aviso: falha ao enviar aprovação do bot."
          else
            echo "Secrets ou número do PR não disponíveis para o bot."
          fi

