# CI — gates de Pull Request (backend + frontend + auto-approve). Migração Jenkins → Gitea Actions.
#
# SÓ roda em `pull_request`: os gates pertencem ao PR. O deploy (e os gates no contexto
# da main) são do release.yml, que RE-roda backend/frontend no push da main — o Sonar
# Community só analisa push e o job `sonar` consome o coverage.out gerado no mesmo run.
# Manter `push: [main]` aqui duplicava backend+frontend a cada merge (o release já os roda).
name: CI
on:
  pull_request:

concurrency:
  # Cancela runs antigas do mesmo PR quando chega um commit novo.
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: [self-hosted, arm64]
    # Postgres de teste como service container (substitui o sidecar jackui-ci-pg do Jenkins).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jackui
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: jackui
          PGPORT: 5433
        # Health-check pra o runner só liberar os steps quando o PG aceitar
        # conexões (o act_runner nem sempre espera; o step "aguardar Postgres"
        # abaixo é o reforço definitivo contra "connection refused").
        options: >-
          --health-cmd "pg_isready -U jackui -p 5433"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      JACKUI_TEST_DATABASE_URL: postgres://jackui:ci@127.0.0.1:5433/jackui?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # fonte única da versão do Go (igual ao semidx)
          cache: true
          cache-dependency-path: go.sum
      - name: ffmpeg (testes de transcode/streamer)
        # ports.ubuntu.com (arm64) flapping: retry apt instead of failing the
        # whole PR gate on a transient mirror blip. Prefer a preinstalled binary
        # on the runner image when present.
        run: |
          set -euo pipefail
          if command -v ffmpeg >/dev/null 2>&1; then
            ffmpeg -version | head -1
            exit 0
          fi
          for i in 1 2 3 4 5; do
            echo "apt install ffmpeg attempt $i…"
            if sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq ffmpeg; then
              ffmpeg -version | head -1
              exit 0
            fi
            sleep $((i * 5))
          done
          echo "ERRO: não foi possível instalar ffmpeg após retries"
          exit 1
      - name: gofmt (falha se houver arquivo fora do padrão)
        run: 'test -z "$(gofmt -l .)" || { echo "gofmt:"; gofmt -l .; exit 1; }'
      - name: go vet
        run: go vet ./internal/...
      - name: aguardar Postgres estável
        run: |
          # Um único connect podia pegar o Postgres num piscar do arranque (initdb/
          # restart) e o go test logo depois falhava com "connection refused" (flake
          # recorrente). Exigimos o port ABERTO E ESTÁVEL (3 connects consecutivos, 2s
          # de intervalo) e FALHAMOS o job se não estabilizar em ~120s — em vez de
          # seguir cego pro go test.
          ok=0
          for i in $(seq 1 60); do
            if (exec 3<>/dev/tcp/127.0.0.1/5433) 2>/dev/null; then exec 3>&-; ok=$((ok+1)); else ok=0; fi
            [ "$ok" -ge 3 ] && { echo "postgres estável ($i)"; break; }
            echo "aguardando postgres estabilizar ($i, ok=$ok)…"; sleep 2
          done
          [ "$ok" -ge 3 ] || { echo "ERRO: postgres não estabilizou em ~120s"; exit 1; }
      - name: go test + cobertura
        # -timeout 20m: o pacote internal/handlers roda testes de ffmpeg REAL
        # (transcode HLS) e vivia ~9m17s — perto do default de 10m do `go test`.
        # Sob carga do runner (release concorrente) estourava 600s e o pacote dava
        # `panic: test timed out`, reprovando o backend e pulando o deploy. 20m dá
        # folga sem mascarar um hang de verdade.
        run: go test -p 4 -timeout 20m -coverprofile=coverage.out ./internal/...
      - name: Publica coverage.out (para o job do Sonar p/ main em release.yml)
        uses: actions/upload-artifact@v3
        env:
          # This Node action uploads to the Gitea artifact API over TLS. Its cert is
          # signed by the internal "Development CA"; Node ignores the OS trust store
          # (where the act-ubuntu:ca image bakes that CA), so trust the CA explicitly
          # instead of disabling verification. Keeps TLS verification intact.
          NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/gitea-ca.crt
        with:
          name: go-coverage
          path: coverage.out

  frontend:
    runs-on: [self-hosted, arm64]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint      # ESLint: sonarjs/cognitive-complexity 15 (espelha S3776)
      - run: npm run check:i18n # falha se houver PT acentuado hardcoded em posição de UI (#419)
      - run: npm test          # vitest run
      - run: npm run build

  # Gates de segurança (espelham o semidx): secret scan, CVEs em deps/stdlib e SAST.
  # Steps `go run` portáveis; gosec pinado porque @latest exige Go >= 1.26.
  gitleaks:
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run github.com/zricethezav/gitleaks/v8@latest detect --source . --no-banner --redact --exit-code 1

  govulncheck:
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # SAST — BLOQUEANTE (#480). Os 116 findings da 1ª rodada foram triados: fixes
  # reais (G112 ReadHeaderTimeout, G115 overflow de header de zip em archive.go) e
  # `#nosec RULE -- motivo` nos aceitos (G304 paths validados por ResolvePath/hash,
  # G204 exec sem shell com args controlados, G301/G302/G306 perms de mídia
  # intencionais, G401/G505 hash não-cripto, G104 cleanup best-effort, G101/G706
  # falsos-positivos). gosec agora reporta 0 findings; sem `|| true` e DENTRO de
  # `approve.needs` — um finding novo (Nosec não justificado) reprova o PR, igual
  # ao semidx. Novos #nosec exigem `-- motivo` (triagem explícita).
  gosec:
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go run github.com/securego/gosec/v2/cmd/gosec@v2.27.1 -quiet ./...

  approve:
    needs: [backend, frontend, gitleaks, govulncheck, gosec]
    runs-on: [self-hosted, arm64]
    # Executa a aprovação se os testes passarem e for de fato um PR
    if: github.event_name == 'pull_request'
    steps:
      - name: Auto-approve PR via bot
        env:
          BOTK: ${{ secrets.REGISTRY_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -n "$BOTK" ] && [ -n "$PR_NUMBER" ]; then
            echo "Aprovando PR #$PR_NUMBER via bot..."
            curl -sf -X POST -H "Authorization: token $BOTK" -H 'Content-Type: application/json' \
              "${{ github.api_url }}/repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
              -d '{"event":"APPROVED","body":"Gates do CI verdes (backend test + frontend build) — aprovado automaticamente pelo ci-bot no Gitea Actions."}' || echo "Aviso: falha ao enviar aprovação do bot."
          else
            echo "Secrets ou número do PR não disponíveis para o bot."
          fi

