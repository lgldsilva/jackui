# RELEASE — pipeline completo da main (Sonar gate → SBOM ‖ build/scan/push/deploy).
# ⚠ Protótipo: trigger manual até os runners estarem registrados. Ativar depois com:
#   on:
#     push:
#       branches: [main]
#
# Diferença-chave vs Jenkins: `needs:` torna a ordem EXPLÍCITA — o deploy NÃO roda
# se o gate do Sonar falhar (fim do "silent skip deploy" que nos mordeu).
# SonarQube Community NÃO faz análise de PR → o gate roda só no push da main (igual hoje).
name: Release
on:
  push:
    branches: [main]

concurrency:
  # Serializa deploys da main; nunca cancela um deploy em andamento.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Reexecuta os gates no contexto da main (mesma lógica do ci.yml).
  backend:
    runs-on: [self-hosted, arm64]
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: jackui, POSTGRES_PASSWORD: ci, POSTGRES_DB: jackui, PGPORT: 5433 }
        options: >-
          --health-cmd "pg_isready -U jackui -p 5433"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      JACKUI_TEST_DATABASE_URL: postgres://jackui:ci@127.0.0.1:5433/jackui?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum
      - name: ffmpeg (testes de transcode/streamer)
        run: |
          set -euo pipefail
          if command -v ffmpeg >/dev/null 2>&1; then ffmpeg -version | head -1; exit 0; fi
          for i in 1 2 3 4 5; do
            echo "apt install ffmpeg attempt $i…"
            if sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq ffmpeg; then
              ffmpeg -version | head -1; exit 0
            fi
            sleep $((i * 5))
          done
          echo "ERRO: não foi possível instalar ffmpeg após retries"; exit 1
      - run: 'test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }'
      - run: go vet ./internal/...
      # Reforço contra "connection refused": exige o PG ESTÁVEL antes dos testes.
      - name: aguardar Postgres estável
        run: |
          # Um único connect podia pegar o Postgres num piscar do arranque (initdb/
          # restart) e o go test logo depois falhava com "connection refused" (flake
          # recorrente). Exigimos o port ABERTO E ESTÁVEL (3 connects consecutivos, 2s
          # de intervalo) e FALHAMOS o job se não estabilizar em ~120s — em vez de
          # seguir cego pro go test.
          ok=0
          for i in $(seq 1 60); do
            if (exec 3<>/dev/tcp/127.0.0.1/5433) 2>/dev/null; then exec 3>&-; ok=$((ok+1)); else ok=0; fi
            [ "$ok" -ge 3 ] && { echo "postgres estável ($i)"; break; }
            echo "aguardando postgres estabilizar ($i, ok=$ok)…"; sleep 2
          done
          [ "$ok" -ge 3 ] || { echo "ERRO: postgres não estabilizou em ~120s"; exit 1; }
      # -timeout 20m: internal/handlers roda ffmpeg real e vivia ~9m17s (perto do
      # default 10m); sob carga do runner estourava 600s → deploy pulado. Ver ci.yml.
      - run: go test -p 4 -timeout 20m -coverprofile=coverage.out ./internal/...
      - uses: actions/upload-artifact@v3
        env:
          # This Node action talks to the Gitea artifact API over TLS. Its cert is
          # signed by the internal "Development CA"; Node ignores the OS trust store
          # (where the act-ubuntu:ca image bakes that CA), so point it at the CA
          # instead of disabling verification. Keeps TLS verification intact.
          NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/gitea-ca.crt
        with: { name: go-coverage, path: coverage.out }

  frontend:
    runs-on: [self-hosted, arm64]
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run build

  sonar:
    needs: [backend, frontend]
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/download-artifact@v3
        env:
          # Same as upload-artifact: trust the homelab CA baked into the job image
          # instead of disabling TLS verification.
          NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/gitea-ca.crt
        with: { name: go-coverage }
      - name: SonarQube analysis + gate (permanent + reports)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_HOSTS_ENTRY: ${{ vars.SONAR_HOSTS }}
          NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/gitea-ca.crt
        run: |
          set -eu
          [ -n "${SONAR_HOSTS_ENTRY:-}" ] && echo "$SONAR_HOSTS_ENTRY" | sudo tee -a /etc/hosts >/dev/null || true
          : "${SONAR_HOST_URL:=https://sonar.raspberrypi.lan}"
          export SONAR_HOST_URL
          chmod +x scripts/sonar/sonar-ephemeral.sh
          export PROJECT_KEY=jackui
          export PROJECT_NAME=JackUI
          export EPHEMERAL=0
          export USE_PROJECT_PROPERTIES=1
          # coverage.out from download-artifact step above
          export COVERAGE_FILE=coverage.out
          export REPORT_DIR="$PWD/sonar-out"
          export REPORT_FILE="$REPORT_DIR/sonar-report.txt"
          export SCANNER=npx
          ./scripts/sonar/sonar-ephemeral.sh
          ls -la "$REPORT_DIR" || true
      - name: Upload Sonar reports as Actions artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v3
        env:
          NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/gitea-ca.crt
        with:
          name: sonar-report-main-${{ github.sha }}
          path: |
            sonar-out/sonar-report.json
            sonar-out/sonar-report.md
            sonar-out/sonar-report.txt
            sonar-out/sonar-report-pr*.zip
          if-no-files-found: warn
          retention-days: 30

  sbom:
    needs: [backend, frontend]
    runs-on: [self-hosted, arm64]
    continue-on-error: true   # best-effort: NUNCA derruba o build (igual hoje)
    steps:
      - uses: actions/checkout@v4
      - name: cdxgen → Dependency-Track
        env:
          DT_API: ${{ secrets.DT_API }}
          DT_USER: ${{ secrets.DT_USER }}
          DT_PASS: ${{ secrets.DT_PASS }}
        run: bash scripts/sbom-upload.sh || true   # extrair do Jenkinsfile p/ script versionado

  deliver:
    needs: [sonar]            # ← só entrega se o GATE passou
    runs-on: [self-hosted, deploy]   # homeserver: amd64 nativo + GPU + docker.sock
    env:
      # Host do container registry — configurado em Settings → Actions → Variables (vars.REGISTRY).
      REGISTRY: "${{ vars.REGISTRY }}"
      IMAGE: "${{ vars.REGISTRY }}/${{ github.repository }}"
    steps:
      # fetch-depth: 0 traz TODAS as tags — sem elas o semver.sh não acha a última
      # (ex. v0.78.5) e cai no fallback v0.0.1 (tela Sobre mostrava version=v0.0.1).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: semver
        id: ver
        run: echo "semver=$(bash scripts/semver.sh)" >> "$GITHUB_OUTPUT"
      - name: docker build (nvidia, amd64 nativo)
        run: |
          docker build -f Dockerfile.nvidia \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg APP_VERSION=${{ steps.ver.outputs.semver }} \
            --build-arg BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t $IMAGE:${{ github.sha }} -t $IMAGE:nvidia .
      - name: Trivy (gate CRITICAL, imagem LOCAL, ANTES do push)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v /tmp/trivy-cache:/root/.cache/ \
            aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f \
            image --scanners vuln --no-progress --ignore-unfixed \
            --severity CRITICAL --exit-code 1 $IMAGE:nvidia
      - name: push (só após Trivy OK)
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login $REGISTRY -u lgldsilva --password-stdin
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:nvidia
          docker logout $REGISTRY
      # Tag + Release ANTES do deploy: o artefato já foi buildado, escaneado (Trivy)
      # e pushado — ele É a release. Amarrar a tag ao fim do deploy fazia um flake no
      # healthcheck de 300s (deploy ia, mas o job caía) PULAR a publicação da tag →
      # a versão ia pra imagem mas a tag nunca saía (drift tag↔deploy). Publicar aqui
      # elimina esse buraco. O script é idempotente e não-releasable → no-op.
      - name: Tag + Release (Gitea) com changelog
        env:
          SEMVER: ${{ steps.ver.outputs.semver }}
          GITEA_API: ${{ github.api_url }}
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          SHA: ${{ github.sha }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        # Não-fatal: a tag/Release é best-effort e vem ANTES do deploy — um imprevisto
        # aqui NÃO pode bloquear a entrega (o artefato já foi buildado+escaneado+pushado;
        # a tag pode ser refeita idempotentemente num re-run).
        run: |
          bash scripts/publish-release.sh || echo "Aviso: publish-release falhou — deploy segue."
      - name: deploy (docker.sock local; recria jackui no projeto compose de prod)
        run: |
          docker pull $IMAGE:nvidia
          docker tag $IMAGE:nvidia jackui:nvidia
          # PROD_COMPOSE aponta pro compose PAI (vpn-gateway), que faz `include` do jackui:
          # o container roda no projeto "vpn-gateway", junto do gluetun (network_mode:
          # service:gluetun). Mirar o compose standalone do jackui criava um container órfão
          # "jackui-jackui-1" que morria (exit 1) e deixava o prod real intocado — deploy
          # verde-falso. --no-deps recria SÓ o jackui, sem tocar gluetun/postgres.
          docker compose -f "${{ secrets.PROD_COMPOSE }}" up -d --no-deps --force-recreate jackui
      - name: verificar deploy (healthz + commit) — fim do "verde-falso"
        run: |
          # docker compose up -d retorna 0 mesmo se o container morre logo após subir.
          # Falhamos o job se /status não responder ok NO COMMIT novo dentro da janela.
          # Janela = 300s: o boot do jackui reconcilia (RescueStuckMoving/resumeSeeding/
          # piece verify) e às vezes passa de 90s — antes isso dava "vermelho-falso"
          # (deploy ia, mas o job falhava e pulava tag/cleanup/notify).
          want="${{ github.sha }}"
          for i in $(seq 1 60); do
            out=$(docker exec gluetun wget -qO- http://127.0.0.1:8989/status 2>/dev/null || true)
            if echo "$out" | grep -q '"status":"ok"' && echo "$out" | grep -q "$want"; then
              echo "deploy OK: $out"; exit 0
            fi
            sleep 5
          done
          echo "DEPLOY FALHOU: /status não reporta ok+commit $want após 300s"
          docker exec gluetun wget -qO- http://127.0.0.1:8989/status 2>/dev/null || true
          exit 1
      - name: Limpeza de versões de pacotes antigas
        env:
          GITEA_API: ${{ github.api_url }}
          GITEA_USER: ${{ github.repository_owner }}
          GITEA_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          bash scripts/cleanup-packages.sh || echo "Aviso: falha na limpeza de pacotes."
      - name: Notificar sucesso no Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEMVER: ${{ steps.ver.outputs.semver }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            MSG="✅ JackUI ${SEMVER:-} deployado com sucesso via Gitea Actions\nCommit: $(echo ${{ github.sha }} | cut -c1-7)"
            curl -sf -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              --data-urlencode "chat_id=$TG_CHAT" \
              --data-urlencode "text=$MSG" > /dev/null || echo "Aviso: notificação Telegram falhou."
          fi

  notify-failure:
    needs: [backend, frontend, sonar, deliver]
    runs-on: [self-hosted, arm64]
    if: failure()
    steps:
      - name: Notificar falha no Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            MSG="❌ JackUI: Build ou Deploy FALHOU no Gitea Actions.\nCommit: $(echo ${{ github.sha }} | cut -c1-7)"
            curl -sf -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              --data-urlencode "chat_id=$TG_CHAT" \
              --data-urlencode "text=$MSG" > /dev/null || echo "Aviso: notificação Telegram falhou."
          fi

