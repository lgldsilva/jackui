# RELEASE — pipeline completo da main (Sonar gate → SBOM ‖ build/scan/push/deploy).
# ⚠ Protótipo: trigger manual até os runners estarem registrados. Ativar depois com:
#   on:
#     push:
#       branches: [main]
#
# Diferença-chave vs Jenkins: `needs:` torna a ordem EXPLÍCITA — o deploy NÃO roda
# se o gate do Sonar falhar (fim do "silent skip deploy" que nos mordeu).
# SonarQube Community NÃO faz análise de PR → o gate roda só no push da main (igual hoje).
name: Release
on:
  push:
    branches: [main]

jobs:
  # Reexecuta os gates no contexto da main (mesma lógica do ci.yml).
  backend:
    runs-on: [self-hosted, arm64]
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: jackui, POSTGRES_PASSWORD: ci, POSTGRES_DB: jackui, PGPORT: 5433 }
    env:
      JACKUI_TEST_DATABASE_URL: postgres://jackui:ci@127.0.0.1:5433/jackui?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: go.sum
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: 'test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }'
      - run: go vet ./internal/...
      - run: go test -coverprofile=coverage.out ./internal/...
      - uses: actions/upload-artifact@v3
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        with: { name: go-coverage, path: coverage.out }

  frontend:
    runs-on: [self-hosted, arm64]
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run build

  sonar:
    needs: [backend, frontend]
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/download-artifact@v3
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        with: { name: go-coverage }
      - name: SonarQube analysis + gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        run: |
          echo "192.168.0.100 sonar.raspberrypi.lan" | sudo tee -a /etc/hosts || echo "192.168.0.100 sonar.raspberrypi.lan" >> /etc/hosts || true
          npx -y sonarqube-scanner \
            -Dsonar.host.url=https://sonar.raspberrypi.lan \
            -Dsonar.token=$SONAR_TOKEN

  sbom:
    needs: [backend, frontend]
    runs-on: [self-hosted, arm64]
    continue-on-error: true   # best-effort: NUNCA derruba o build (igual hoje)
    steps:
      - uses: actions/checkout@v4
      - name: cdxgen → Dependency-Track
        env:
          DT_API: ${{ secrets.DT_API }}
          DT_USER: ${{ secrets.DT_USER }}
          DT_PASS: ${{ secrets.DT_PASS }}
        run: bash scripts/sbom-upload.sh || true   # extrair do Jenkinsfile p/ script versionado

  deliver:
    needs: [sonar]            # ← só entrega se o GATE passou
    runs-on: [self-hosted, deploy]   # homeserver: amd64 nativo + GPU + docker.sock
    env:
      REGISTRY: "${{ vars.REGISTRY || 'gitea.raspberrypi.lan' }}"
      IMAGE: "${{ vars.REGISTRY || 'gitea.raspberrypi.lan' }}/lgldsilva/jackui"
    steps:
      - uses: actions/checkout@v4
      - name: semver
        id: ver
        run: echo "semver=$(bash scripts/semver.sh)" >> "$GITHUB_OUTPUT"
      - name: docker build (nvidia, amd64 nativo)
        run: |
          docker build -f Dockerfile.nvidia \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            --build-arg APP_VERSION=${{ steps.ver.outputs.semver }} \
            --build-arg BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t $IMAGE:${{ github.sha }} -t $IMAGE:nvidia .
      - name: Trivy (gate CRITICAL, imagem LOCAL, ANTES do push)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v /tmp/trivy-cache:/root/.cache/ \
            aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f \
            image --scanners vuln --no-progress --ignore-unfixed \
            --severity CRITICAL --exit-code 1 $IMAGE:nvidia
      - name: push (só após Trivy OK)
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login $REGISTRY -u lgldsilva --password-stdin
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:nvidia
          docker logout $REGISTRY
      - name: deploy (docker.sock local; recria jackui no projeto compose de prod)
        run: |
          docker pull $IMAGE:nvidia
          docker tag $IMAGE:nvidia jackui:nvidia
          # PROD_COMPOSE aponta pro compose PAI (vpn-gateway), que faz `include` do jackui:
          # o container roda no projeto "vpn-gateway", junto do gluetun (network_mode:
          # service:gluetun). Mirar o compose standalone do jackui criava um container órfão
          # "jackui-jackui-1" que morria (exit 1) e deixava o prod real intocado — deploy
          # verde-falso. --no-deps recria SÓ o jackui, sem tocar gluetun/postgres.
          docker compose -f "${{ secrets.PROD_COMPOSE }}" up -d --no-deps --force-recreate jackui
      - name: verificar deploy (healthz + commit) — fim do "verde-falso"
        run: |
          # docker compose up -d retorna 0 mesmo se o container morre logo após subir.
          # Aqui falhamos o job se /status não responder ok NO COMMIT novo em até 90s.
          want="${{ github.sha }}"
          for i in $(seq 1 30); do
            out=$(docker exec gluetun wget -qO- http://127.0.0.1:8989/status 2>/dev/null || true)
            if echo "$out" | grep -q '"status":"ok"' && echo "$out" | grep -q "$want"; then
              echo "deploy OK: $out"; exit 0
            fi
            sleep 3
          done
          echo "DEPLOY FALHOU: /status não reporta ok+commit $want após 90s"
          docker exec gluetun wget -qO- http://127.0.0.1:8989/status 2>/dev/null || true
          exit 1
      - name: Publicar tag de versão Git
        env:
          SEMVER: ${{ steps.ver.outputs.semver }}
          GITEA_USER: "lgldsilva"
          GITEA_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          if [ -n "$SEMVER" ]; then
            git config --global user.name "Gitea Actions"
            git config --global user.email "actions@gitea.raspberrypi.lan"
            if git rev-parse "refs/tags/$SEMVER" >/dev/null 2>&1; then
              echo "Tag $SEMVER já existe — nada a publicar."
            else
              git tag "$SEMVER"
              git -c http.sslVerify=false push "https://$GITEA_USER:$GITEA_TOKEN@gitea.raspberrypi.lan/lgldsilva/jackui.git" "refs/tags/$SEMVER" || echo "Aviso: push da tag falhou."
            fi
          fi
      - name: Limpeza de versões de pacotes antigas
        env:
          GITEA_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          bash scripts/cleanup-packages.sh || echo "Aviso: falha na limpeza de pacotes."
      - name: Notificar sucesso no Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEMVER: ${{ steps.ver.outputs.semver }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            MSG="✅ JackUI ${SEMVER:-} deployado com sucesso via Gitea Actions\nCommit: $(echo ${{ github.sha }} | cut -c1-7)"
            curl -sf -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              --data-urlencode "chat_id=$TG_CHAT" \
              --data-urlencode "text=$MSG" > /dev/null || echo "Aviso: notificação Telegram falhou."
          fi

  notify-failure:
    needs: [backend, frontend, sonar, deliver]
    runs-on: [self-hosted, arm64]
    if: failure()
    steps:
      - name: Notificar falha no Telegram
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ]; then
            MSG="❌ JackUI: Build ou Deploy FALHOU no Gitea Actions.\nCommit: $(echo ${{ github.sha }} | cut -c1-7)"
            curl -sf -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              --data-urlencode "chat_id=$TG_CHAT" \
              --data-urlencode "text=$MSG" > /dev/null || echo "Aviso: notificação Telegram falhou."
          fi

