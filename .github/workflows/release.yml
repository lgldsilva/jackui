name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.event.head_commit.id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  semver:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - id: semver
        run: echo "version=$(bash scripts/semver.sh)" >> $GITHUB_OUTPUT

  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: [semver, ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Free disk space
        run: |
          set -uo pipefail  # NOT -e (L7)
          df -h /tmp /github/workspace 2>/dev/null || true
          sudo rm -rf /opt/hostedtoolcache/Node* \
                       /opt/hostedtoolcache/Python* \
                       /opt/hostedtoolcache/Ruby* \
                       /opt/hostedtoolcache/dotnet \
                       /opt/hostedtoolcache/php \
                       /opt/hostedtoolcache/go/1.* 2>/dev/null || true
          go clean -cache -modcache 2>/dev/null || true

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy
        run: |
          set -uo pipefail  # NOT -e (L7)
          TRIVY_VERSION="0.58.1"
          curl -sSfL \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tar.gz
          tar xzf /tmp/trivy.tar.gz -C /tmp trivy
          mv /tmp/trivy /usr/local/bin/trivy
          trivy --version

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:v${{ needs.semver.outputs.version }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            APP_VERSION=${{ needs.semver.outputs.version }}
            BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

      - name: Build and push (nvidia)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:nvidia
          platforms: linux/amd64
          file: Dockerfile.nvidia
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            APP_VERSION=${{ needs.semver.outputs.version }}
            BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

      - name: Trivy scan
        run: |
          trivy image --severity CRITICAL --exit-code 1 --ignore-unfixed \
            ghcr.io/${{ github.repository }}:v${{ needs.semver.outputs.version }}

      - name: Generate SBOM
        run: |
          trivy image --format cyclonedx --output bom.json --ignore-unfixed \
            ghcr.io/${{ github.repository }}:v${{ needs.semver.outputs.version }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom
          path: bom.json

  release:
    needs: [semver, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - id: changelog
        run: |
          {
            echo 'changelog<<EOF'
            bash scripts/changelog.sh ${{ needs.semver.outputs.version }}
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: sbom

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: v${{ needs.semver.outputs.version }}
          name: v${{ needs.semver.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          fail_on_unmatched_files: true
          files: bom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
