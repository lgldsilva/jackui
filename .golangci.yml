# Reproduz LOCALMENTE o gate de new-code do CI antes do push.
# Uso documentado:
#
#   golangci-lint run --new-from-rev=origin/main ./...
#
# --new-from-rev reporta só as linhas do SEU diff, sem falso-positivo de
# código pré-existente. Não roda no pipeline — o CI cobre gofmt/vet.
version: "2"
run:
  tests: false
linters:
  default: none
  enable:
    - gocognit
    - gocritic
    - staticcheck
  settings:
    gocognit:
      # >15 é o que o Sonar (S3776) reprova em código novo.
      min-complexity: 16
