# Reproduz LOCALMENTE o gate de new-code do Sonar antes do push (um ciclo de CI
# custa ~12min). Uso documentado (docs/CICD.md → "Running the gates locally"):
#
#   golangci-lint run --new-from-rev=gitea/main ./...
#
# --new-from-rev reporta só as linhas do SEU diff (espelha o "new code" do Sonar,
# sem falso-positivo de código pré-existente). Não roda no pipeline — o CI cobre
# gofmt/vet e o Sonar aplica S3776 na main.
version: "2"
run:
  tests: false
linters:
  default: none
  enable:
    - gocognit
    - gocritic
    - staticcheck
  settings:
    gocognit:
      # >15 é o que o Sonar (S3776) reprova em código novo.
      min-complexity: 16
