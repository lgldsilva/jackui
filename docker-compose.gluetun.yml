# Gluetun overlay — routes all JackUI traffic through the existing gluetun VPN container.
#
# Compose with: docker compose -f docker-compose.yml -f docker-compose.gluetun.yml up -d
#
# Requires:
#   1. The 'gluetun' container is already running on the same Docker host
#      (managed by another compose project — the VPN gateway)
#   2. Gluetun's compose file MUST expose the JackUI web UI port. Add this line
#      to gluetun's `ports:` section and recreate it:
#
#        ports:
#          - "8989:8989/tcp"     # JackUI web UI
#
#      NOTE: leech-only deployment (consume through the VPN, not seed). We do NOT
#      publish a BitTorrent peer port — inbound peer connections aren't needed to
#      download. Only the UI port needs exposing; all of JackUI's OUTBOUND
#      traffic (peers, trackers, DHT) already rides the VPN by sharing gluetun's
#      network namespace.
#
#   3. Once gluetun re-exposes the UI port, the web UI is reachable on the host
#      while every outbound connection from JackUI goes through the VPN tunnel.

services:
  jackui:
    # Container network namespace is shared with gluetun.
    # All outbound traffic from JackUI goes through the VPN.
    # All inbound traffic to the gluetun-exposed ports lands in JackUI.
    network_mode: "container:gluetun"

    # When sharing a container's network namespace, we can't define our own ports / network.
    # The "ports:" and "networks:" fields from the base file are nulled here.
    ports: !reset []
    networks: !reset []
