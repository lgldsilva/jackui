sonar.projectKey=jackui
sonar.projectName=JackUI

sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,**/ui/dist/**,**/*.cov,**/vendor/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.go.coverage.reportPaths=coverage.out

# Fora da métrica de cobertura:
#  - web/**: frontend não tem harness de teste unitário (validado por build + manual).
#  - cmd/**: main.go é só wiring (Gin routes + workers), coberto por E2E/manual.
# Senão a condição new_coverage do quality gate fica irreal. Cobertura = lógica Go.
sonar.coverage.exclusions=web/**,cmd/**

# Exceções documentadas (padrão do time: exceção a smell precisa de justificativa).
# S6847/S6848: os modais usam <dialog> como backdrop com onClick (fechar ao clicar
# fora) + onKeyDown (Escape). É um padrão de modal intencional e acessível (foco
# preso, Escape fecha); a regra jsx-a11y não reconhece <dialog> como interativo.
# Refactor p/ um <ModalShell> compartilhado está como follow-up.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S6847
sonar.issue.ignore.multicriteria.e1.resourceKey=web/src/**/*.tsx
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S6848
sonar.issue.ignore.multicriteria.e2.resourceKey=web/src/**/*.tsx
